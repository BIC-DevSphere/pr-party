<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contributor Card</title>
    <style>
      :root {
        --mint-bg: #e3efe9;
        --mint-text: #377561;
        --text-main: #1c1c1c;
        --border-light: #f0f0f0;
        --text-muted: #a0a0a0;
        --pill-bg: #ebe7dc;
        --pill-border: #dfdbcf;
      }

      body {
        background-color: #efece5;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        margin: 0;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica,
          Arial, sans-serif;
      }

      .card {
        background: #ffffff;
        width: 360px;
        border-radius: 20px;
        overflow: hidden;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
        border: 1px solid rgba(0, 0, 0, 0.04);
      }

      .card-top {
        background-color: var(--mint-bg);
        height: 200px;
        position: relative;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      .status-badge {
        position: absolute;
        top: 16px;
        right: 16px;
        background: rgba(255, 255, 255, 0.9);
        border: 1px solid rgba(0, 0, 0, 0.08);
        border-radius: 20px;
        padding: 6px 12px;
        display: flex;
        align-items: center;
        gap: 6px;
        font-family: ui-monospace, SFMono-Regular, Consolas, monospace;
        font-size: 11px;
        color: var(--mint-text);
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }

      .status-dot {
        width: 6px;
        height: 6px;
        background-color: var(--mint-text);
        border-radius: 50%;
      }

      .initials {
        font-size: 96px;
        font-weight: 900;
        color: var(--mint-text);
        letter-spacing: -6px;
        line-height: 1;
      }

      .card-bottom {
        padding: 20px 24px;
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .header {
        display: flex;
        flex-direction: column;
        gap: 4px;
      }

      h2 {
        margin: 0;
        font-size: 26px;
        font-weight: 800;
        color: var(--text-main);
        letter-spacing: -0.5px;
      }

      .subtitle {
        margin: 0;
        font-family: ui-monospace, SFMono-Regular, Consolas, monospace;
        font-size: 12px;
        color: var(--text-muted);
      }

      .quote {
        font-family: "Georgia", serif;
        font-style: italic;
        color: #666;
        font-size: 15px;
        margin: 8px 0 0 0;
        padding-bottom: 20px;
        border-bottom: 1px solid var(--border-light);
      }

      .details {
        display: flex;
        flex-direction: column;
      }

      .detail-row {
        display: grid;
        grid-template-columns: 80px 1fr;
        padding: 12px 0;
        border-bottom: 1px solid var(--border-light);
        align-items: center;
      }

      .detail-label {
        font-family: ui-monospace, SFMono-Regular, Consolas, monospace;
        font-size: 11px;
        color: var(--text-muted);
        letter-spacing: 1px;
        text-transform: uppercase;
      }

      .detail-value {
        font-size: 14px;
        color: var(--text-main);
        font-weight: 500;
      }

      .val-github {
        font-family: ui-monospace, SFMono-Regular, Consolas, monospace;
        color: var(--mint-text);
        font-weight: 600;
      }

      .tools {
        display: flex;
        gap: 8px;
      }

      .tool-pill {
        background-color: var(--pill-bg);
        border: 1px solid var(--pill-border);
        padding: 4px 8px;
        border-radius: 4px;
        font-family: ui-monospace, SFMono-Regular, Consolas, monospace;
        font-size: 11px;
        color: #555;
        font-weight: 500;
      }

      .card-footer {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding-top: 8px;
      }

      .date {
        font-family: ui-monospace, SFMono-Regular, Consolas, monospace;
        font-size: 11px;
        color: var(--text-muted);
      }

      .profile-link {
        font-size: 13px;
        font-weight: 700;
        color: var(--mint-text);
        text-decoration: none;
        display: flex;
        align-items: center;
        gap: 4px;
      }

      .profile-link span {
        font-weight: 900;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="card-top">
        <div class="status-badge">
          <span class="status-dot"></span>
          PR merged
        </div>
        <div class="initials">AT</div>
      </div>

      <div class="card-bottom">
        <div class="header">
          <h2>Aaditya Thapa</h2>
          <p class="subtitle">Computer Science &bull; Year 1</p>
        </div>

        <p class="quote">“Every expert was once a beginner with a terminal.”</p>

        <div class="details">
          <div class="detail-row">
            <span class="detail-label">GITHUB</span>
            <span class="detail-value val-github">@aaditya-t</span>
          </div>
          <div class="detail-row">
            <span class="detail-label">GOAL</span>
            <span class="detail-value">Open source contribution</span>
          </div>
          <div class="detail-row">
            <span class="detail-label">TOOLS</span>
            <div class="tools">
              <span class="tool-pill">Python</span>
              <span class="tool-pill">Git</span>
              <span class="tool-pill">Linux</span>
            </div>
          </div>
        </div>

        <div class="card-footer">
          <span class="date">Mar 17, 2026</span>
          <div class="profile-link">View profile <span>&rarr;</span></div>
        </div>
      </div>
    </div>
  </body>
</html>
